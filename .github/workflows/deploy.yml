name: Deploy to GitHub Pages

on:
  # Trigger the workflow on push to the default branch
  push:
    branches: [master]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      force_gallery:
        description: "Force gallery image reprocessing"
        type: boolean
        default: false

# Allow this job to clone the repo and create a page deployment
permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      - name: Delete gallery cache (force mode)
        if: inputs.force_gallery == true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          KEY="gallery-${{ hashFiles('public/images/gallery/*.jpg', 'public/images/gallery/*.jpeg', 'public/images/gallery/*.png', 'public/images/gallery/*.webp') }}"
          gh cache delete "$KEY" -R ${{ github.repository }} || echo "No existing cache to delete"

      - name: Restore processed gallery cache
        id: gallery-cache
        uses: actions/cache@v4
        with:
          path: |
            public/images/gallery/thumbs
            public/images/gallery/display
            public/images/gallery/og
          key: gallery-${{ hashFiles('public/images/gallery/*.jpg', 'public/images/gallery/*.jpeg', 'public/images/gallery/*.png', 'public/images/gallery/*.webp') }}

      - name: Install ImageMagick
        if: steps.gallery-cache.outputs.cache-hit != 'true'
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Process gallery images
        if: steps.gallery-cache.outputs.cache-hit != 'true'
        run: bash scripts/process-gallery.sh

      - name: Remove source gallery images from build
        run: |
          cd public/images/gallery
          find . -maxdepth 1 -type f \( -name '*.jpg' -o -name '*.jpeg' -o -name '*.png' -o -name '*.webp' \) -delete
          echo "Removed source images from deploy output"

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('bun.lock') }}

      - name: Install, build, and upload your site
        uses: withastro/action@v3
        with:
          # path: . # The root location of your Astro project inside the repository. (optional)
          node-version: 22 # The specific version of Node.js to use. (optional)
          package-manager: bun@latest # The specific version of bun to use. (optional)
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify-indexing:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Collect changed post URLs
        id: urls
        run: |
          BASE_URL="https://arijitk.in"

          # On manual dispatch submit all posts; on push only new/modified ones
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FILES=$(find src/content/posts -name '*.md' -type f)
          else
            PARENT=$(git rev-parse --verify HEAD~1 2>/dev/null || echo "")
            if [ -n "$PARENT" ]; then
              FILES=$(git diff --name-only --diff-filter=AM "$PARENT" HEAD -- src/content/posts/ || true)
            else
              FILES=$(find src/content/posts -name '*.md' -type f)
            fi
          fi

          URLS=""
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            slug=$(basename "$file" .md)
            URLS="$URLS $BASE_URL/posts/$slug/"
          done <<< "$FILES"

          URLS=$(echo $URLS | xargs)
          echo "urls=$URLS" >> $GITHUB_OUTPUT
          echo "Queued for indexing: $URLS"

      - name: Submit URLs to Google Indexing API
        if: steps.urls.outputs.urls != ''
        env:
          GOOGLE_SA_KEY: ${{ secrets.GOOGLE_INDEXING_SA_KEY }}
          URLS: ${{ steps.urls.outputs.urls }}
        run: |
          pip install google-auth --quiet
          python3 - << 'PYEOF'
          import json, os, sys, urllib.request
          import google.auth.transport.requests
          import google.oauth2.service_account

          sa_key_str = os.environ.get("GOOGLE_SA_KEY", "").strip()
          if not sa_key_str:
              print("GOOGLE_INDEXING_SA_KEY secret not configured — skipping indexing.")
              sys.exit(0)

          sa_key = json.loads(sa_key_str)
          credentials = google.oauth2.service_account.Credentials.from_service_account_info(
              sa_key,
              scopes=["https://www.googleapis.com/auth/indexing"],
          )

          auth_req = google.auth.transport.requests.Request()
          credentials.refresh(auth_req)

          urls = os.environ["URLS"].split()
          errors = []

          for url in urls:
              data = json.dumps({"url": url, "type": "URL_UPDATED"}).encode()
              req = urllib.request.Request(
                  "https://indexing.googleapis.com/v3/urlNotifications:publish",
                  data=data,
                  headers={
                      "Content-Type": "application/json",
                      "Authorization": f"Bearer {credentials.token}",
                  },
                  method="POST",
              )
              try:
                  with urllib.request.urlopen(req) as resp:
                      print(f"OK  {url}")
              except urllib.error.HTTPError as e:
                  body = e.read().decode()
                  print(f"ERR {url} -> HTTP {e.code}: {body}", file=sys.stderr)
                  errors.append(url)

          if errors:
              sys.exit(1)
          PYEOF
